name: habitflow
description: A habit tracking application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  google_sign_in: ^6.2.1
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.66.2
  flutter_heatmap_calendar: ^1.0.5
  flutter_local_notifications: ^17.2.2
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  confetti: ^0.7.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
dependency_overrides:
  flutter_local_notifications: ^17.2.2